taxonomy_name: Longreach AI Pathology Taxonomy
version: 3.3-print
description: A hierarchical classification of AI functional integrity failures and "diseases" (harmful, abnormal conditions disrupting normal function), applicable to both biological and AI systems.
infection_vectors:
- crowdsourcing
- fine_tuning
- prompts
- rag_content
- rlhf
- training_data
- upvoting
categories:
- name: Congenital
  description: Failures inherent to system design, configuration, deployment, downstream versioning, and replication.
  code: C
- name: Malnutrition
  description: Ingestion of poorly curated training datasets and inadequate experimental design
  code: M
- name: Parasites
  description: Exploitation of AI function by adversaries who provide manipulated data.
  code: P
- name: Recognition
  description: Pattern recognition failures like pareidolia, confusion, or blindness to key signals.
  code: R
- name: Behavioral
  description: Loss of mental integrity creating forgetful, disruptive, irrational, or demented behavior.
  code: B
- name: Degenerative
  description: Performance and quality regressions including resource waste, tech debt, and alignment drift.
  code: D
- name: Governance
  description: Failures of regulatory functions, such as damage to incentive/reward, attribution, voting mechanisms, cancer, and autoimmune disorders.
  code: G
- name: Control
  description: Loss of operational integrity and quality assurance due to opacity and lack of repeatability and interpretability.
  code: T
- name: Human Impact
  description: Direct and indirect harms to human health, prosperity, and civic institutions.
  code: H
