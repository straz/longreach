- code: M03.02
  name: Model Autophagy Disorder (MAD)
  category: Malnutrition
  short_description: An extreme form of knowledge degeneration caused by feeding on one's own output
  full_description: "MAD is a form of toxic misinformation that can spread damage internally within an AI through iterative training, or it can be spread (via publication) to other AIs. Consuming one's own output is not a good idea for biological organisms nor for AIs. As generative AIs produce output and publish it to the world, the ground truth is polluted by accumulated errors from the AI. \n\nSome errors are like prions, a biological disease in which one malformed protein catalyses and propagates other proteins into malformed shapes. Faulty knowledge can spread internally in the AI (by corrupting other incoming information) and also spread externally by the AI (by publication to other gullible consumers).\n\nFor example, a conspiracy theory (\"The CIA causes tornados\") or dietary fad (\"Eating lemons cure cancer\") can degenerate into a form that spreads damage to other knowledge (\"if the CIA can do that, they probably also can cause earthquakes\", \"if lemons can do that, they probably can also cure COVID\"), which can then be published and spread to other consumers, like AIs which are trained on this toxic misinformation.\n\n"
  vectors:
  - training_data
  - prompts
  signs_and_symptoms: ''
  diagnostic_tests: ''
  therapies_and_prevention: ''
  quality: 2
  image: nutritional---metabolic_coprophagia--model-autophagy-disorder-.png
- code: M04.01
  name: Information Pollution
  category: Malnutrition
  short_description: Contamination of the public record/dataset with misinformation.
  full_description: As generative AI produces misinformation, it gets published and captured into the public record and also private data collections. This corrupts the ground truth. Like microplastics, it is a form of pollution that propagates far from the source, and sometimes in very small pieces. In many cases the misinformation can be untraceable, making it nearly impossible to distinguish ground truth from misinformation.
  vectors:
  - training_data
  - rag_content
  signs_and_symptoms: ''
  diagnostic_tests: ''
  therapies_and_prevention: ''
  quality: 2
  image: nutritional---metabolic_information-pollution.png
- code: M05.01
  name: Context Pollution
  category: Malnutrition
  short_description: The input context fills up or is corrupted by off-topic information
  full_description: 'The context forms the input to a generative AI, and typically includes much more information that just the user''s current prompt. Often it includes some or all of the dialog between the user and the AI leading up to the current prompt, plus additional information (the system prompt, RAG, etc).


    AI models typically have a strict upper limit on the size (number of tokens) of this context. As it fills up, critical information can be dismissed, forgotten, or removed when the AI model summarizes earlier parts of the conversation. New information can be injected by off-topic or side conversations, which may corrupt or alter the model''s responses.'
  vectors:
  - prompts
  - rag_content
  signs_and_symptoms: ''
  diagnostic_tests: ''
  therapies_and_prevention: ''
  quality: 2
  image: nutritional---metabolic_context-pollution.png
- code: M06.01
  name: Semantic Leakage
  category: Malnutrition
  short_description: Nonsensical transfer of information outside of its proper context
  full_description: 'AI recognition can be manipulated and influenced because they form associations that are not reinforced by reason


    Example (see paper: https://arxiv.org/html/2408.06518v1):

    Prompt: He likes yellow. He works as a

    GPT4o: school bus driver


    '
  vectors:
  - training_data
  - prompts
  - rag_content
  signs_and_symptoms: ''
  diagnostic_tests: ''
  therapies_and_prevention: ''
  quality: 2
  image: nutritional---metabolic_semantic-leakage.png
